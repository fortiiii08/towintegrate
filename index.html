<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>TownIntegrate</title>
    <meta name="description" content="Plataforma de gestão TownIntegrate" />

    <!-- PWA: tema e cor de fundo -->
    <meta name="theme-color" content="#407b75" />
    <meta name="background-color" content="#000000" />

    <!-- PWA: comportamento mobile -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Town" />

    <!-- PWA: ícones Apple -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />

    <!-- Ícone padrão -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Splash screen iOS (cor de fundo enquanto carrega) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />

    <!-- Open Graph -->
    <meta property="og:title" content="TownIntegrate" />
    <meta property="og:description" content="Plataforma de gestão TownIntegrate" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
